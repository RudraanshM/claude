<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Puter Chatbot</title>
            <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }
.content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .content h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.6;
        }

        .login-btn {
                        padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
                        transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .info-text {
            font-size: 12px;
            color: #999;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }

        .hidden {
            display: none !important;
        }

        #puterContainer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Puter Chatbot</h1>
            <p>Powered by Puter.js</p>
        </div>

        <div class="content" id="authContent">
            <h2>Welcome! 👋</h2>
            <p>Login with your Puter account to access<br>cloud-powered chatbot with history storage</p>
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">Login with Puter</button>
        </div>

        <div class="content hidden" id="chatContent">
            <p>Launching Puter environment...</p>
        </div>

        <div class="info-text">
            ℹ️ Built with Puter.js - Cloud-powered platform
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        async function handleLogin() {
            try {
                console.log('Login button clicked');
                const user = await puter.auth.login();
                console.log('User logged in:', user);
                
                // Hide auth, show chat content
                document.getElementById('authContent').classList.add('hidden');
                document.getElementById('chatContent').classList.remove('hidden');
                
                // Launch Puter app
                launchChatApp();
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed: ' + error.message);
            }
        }

        async function launchChatApp() {
            try {
                // Open Puter's app environment
                const app = await puter.ui.showApp({
                    name: 'Chatbot',
                    icon: null,
                    window: {
                        title: 'Puter Chatbot',
                        width: 600,
                        height: 700
                    }
                });
                console.log('App launched:', app);
            } catch (error) {
                console.error('App launch error:', error);
                document.getElementById('chatContent').innerHTML = 
                    `<p>Error launching app: ${error.message}</p>
                     <button class="login-btn" onclick="location.reload()">Reload</button>`;
            }
        }

        // Initialize Puter on page load
        window.addEventListener('load', () => {
            console.log('Page loaded, checking Puter status');
            puter.ui.onReady(() => {
                console.log('Puter is ready');
                // Check if already logged in
                puter.auth.getCurrentUser()
                    .then(user => {
                        console.log('User already logged in:', user);
                        document.getElementById('authContent').classList.add('hidden');
                        document.getElementById('chatContent').classList.remove('hidden');
                        launchChatApp();
                    })
                    .catch(() => {
                        console.log('User not logged in');
                    });
            });
        });
    </script>
</body>
</html>
