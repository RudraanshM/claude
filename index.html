<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Chatbot - Puter.js</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-radius: 4px 12px 12px 12px;
        }

        .message.error .message-content {
            background: #ff6b6b;
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-area {
            border-top: 1px solid #e9ecef;
            padding: 16px;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .config-input {
            flex: 0;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            max-width: 100px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .info-text {
            font-size: 11px;
            color: #999;
            margin-top: 10px;
            text-align: center;
            padding: 0 10px;
        }

        .welcome-message {
            background: #f0f4ff;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
        }

        .welcome-message h3 {
            margin-bottom: 8px;
            color: #667eea;
            font-size: 14px;
        }

        .welcome-message p {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 85%;
            }

            .chat-container {
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Claude Chatbot</h1>
            <p>Powered by Puter.js + Anthropic API</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h3>Welcome! 👋</h3>
                <p>This chatbot uses Puter.js for cloud integration and Claude AI. Enter your Anthropic API key to get started!</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="apiKeyInput" 
                    placeholder="API Key (sk-...)" 
                    class="config-input"
                    autocomplete="off"
                >
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here..." 
                    autocomplete="off"
                >
            </div>
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>

        <div class="info-text">
            ℹ️ Built with Puter.js - Save conversations to cloud storage
        </div>
    </div>

    <script>
        const API_KEY_STORAGE = 'claude_api_key';
        const CLAUDE_API_URL = 'https://api.anthropic.com/v1/messages';
        const MODEL = 'claude-3-5-sonnet-20241022';
        const MAX_TOKENS = 1024;

        let conversationHistory = [];
        let puterReady = false;

        // Initialize Puter.js
        puter.ui.onReady(async () => {
            puterReady = true;
            console.log('Puter.js is ready!');
            
            // Try to load API key from Puter cloud storage
            try {
                const apiKey = await puter.kv.get('claude_api_key');
                if (apiKey) {
                    document.getElementById('apiKeyInput').value = apiKey;
                }
            } catch (e) {
                console.log('No saved API key in Puter cloud storage');
            }

            // Try to load conversation history
            try {
                const savedHistory = await puter.kv.get('chat_history');
                if (savedHistory) {
                    conversationHistory = JSON.parse(savedHistory);
                    console.log('Loaded previous conversation');
                }
            } catch (e) {
                console.log('No previous conversation found');
            }

            document.getElementById('messageInput').focus();
        });

        // Save API key to Puter cloud storage
        document.getElementById('apiKeyInput').addEventListener('change', async (e) => {
            const apiKey = e.target.value.trim();
            if (apiKey && puterReady) {
                try {
                    await puter.kv.set('claude_api_key', apiKey);
                    console.log('API key saved to Puter cloud storage');
                } catch (error) {
                    console.log('Could not save to Puter cloud storage:', error);
                }
            }
        });

        // Send message on Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessages = document.getElementById('chatMessages');

            const message = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!message) {
                alert('Please enter a message');
                return;
            }

            if (!apiKey) {
                alert('Please enter your Claude API key');
                return;
            }

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Add user message to conversation history
                conversationHistory.push({
                    role: 'user',
                    content: message
                });

                // Save conversation to Puter cloud storage
                if (puterReady) {
                    try {
                        await puter.kv.set('chat_history', JSON.stringify(conversationHistory));
                    } catch (e) {
                        console.log('Could not save chat to cloud:', e);
                    }
                }

                // Call Claude API
                const response = await fetch(CLAUDE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        max_tokens: MAX_TOKENS,
                        messages: conversationHistory,
                        system: 'You are a helpful, friendly AI assistant powered by Puter.js. Provide concise and helpful responses.'
                    })
                });

                // Remove typing indicator
                typingDiv.remove();

                if (!response.ok) {
                    const errorData = await response.json();
                    const errorMessage = errorData.error?.message || `API Error: ${response.status}`;
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;

                // Add assistant message to history
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });

                // Save updated conversation
                if (puterReady) {
                    try {
                        await puter.kv.set('chat_history', JSON.stringify(conversationHistory));
                    } catch (e) {
                        console.log('Could not save chat to cloud:', e);
                    }
                }

                // Add assistant message to chat
                addMessage(assistantMessage, 'bot');

            } catch (error) {
                typingDiv.remove();
                const errorMsg = error.message || 'Failed to get response from Claude API';
                addMessage(`Error: ${errorMsg}`, 'error');
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            // Auto scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Clear history with Ctrl+Shift+C
        document.addEventListener('keydown', async (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyC') {
                e.preventDefault();
                conversationHistory = [];
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '<div class="welcome-message"><h3>Welcome! 👋</h3><p>This chatbot uses Puter.js for cloud integration and Claude AI. Enter your Anthropic API key to get started!</p></div>';
                
                // Clear from Puter cloud storage
                if (puterReady) {
                    try {
                        await puter.kv.set('chat_history', JSON.stringify([]));
                    } catch (e) {
                        console.log('Could not clear cloud history:', e);
                    }
                }
                alert('Conversation history cleared!');
            }
        });
    </script>
</body>
</html>
