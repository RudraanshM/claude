<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter.js Chatbot</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .auth-section {
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .auth-section h3 {
            color: #333;
            font-size: 18px;
        }

        .login-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.05);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-radius: 4px 12px 12px 12px;
        }

        .message.error .message-content {
            background: #ff6b6b;
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-area {
            border-top: 1px solid #e9ecef;
            padding: 16px;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .info-text {
            font-size: 11px;
            color: #999;
            margin-top: 10px;
            text-align: center;
            padding: 0 10px;
        }

        .welcome-message {
            background: #f0f4ff;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
        }

        .welcome-message h3 {
            margin-bottom: 8px;
            color: #667eea;
            font-size: 14px;
        }

        .welcome-message p {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .user-info {
            padding: 10px 20px;
            background: #e8f4f8;
            border-bottom: 1px solid #ddd;
            font-size: 12px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            padding: 6px 12px;
            font-size: 11px;
            background: #ff6b6b;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 85%;
            }

            .chat-container {
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>AI Chatbot</h1>
            <p>Powered by Puter.js</p>
        </div>

        <!-- User Info Section -->
        <div class="user-info hidden" id="userInfo">
            <span>Logged in as: <strong id="userName"></strong></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <h3>Welcome to Puter Chatbot!</h3>
            <p style="font-size: 14px; color: #666; margin: 0;">Login with Puter to get started</p>
            <button class="login-btn" onclick="login()">Login with Puter</button>
        </div>

        <!-- Chat Section (hidden until logged in) -->
        <div class="chat-messages hidden" id="chatMessages">
            <div class="welcome-message">
                <h3>Welcome! 👋</h3>
                <p>This is a Puter.js powered chatbot. All your conversations are saved to your Puter cloud storage.</p>
            </div>
        </div>

        <div class="chat-input-area hidden" id="inputArea">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here..." 
                    autocomplete="off"
                >
            </div>
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>

        <div class="info-text">
            ℹ️ Built with Puter.js - Cloud-powered chatbot
        </div>
    </div>

    <script>
        let currentUser = null;
        let conversationHistory = [];

        // Initialize Puter.js
        puter.ui.onReady(async () => {
            console.log('Puter.js is ready!');
            
            try {
                // Check if user is already logged in
                const user = await puter.auth.getCurrentUser();
                if (user) {
                    currentUser = user;
                    loginSuccess();
                }
            } catch (e) {
                console.log('User not logged in');
            }
        });

        async function login() {
            try {
                const user = await puter.auth.login();
                currentUser = user;
                loginSuccess();
            } catch (error) {
                console.error('Login failed:', error);
                alert('Login failed. Please try again.');
            }
        }

        async function loginSuccess() {
            // Hide auth section, show chat
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('chatMessages').classList.remove('hidden');
            document.getElementById('inputArea').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            
            // Set user name
            document.getElementById('userName').textContent = currentUser.username || 'User';

            // Load conversation history from Puter cloud storage
            await loadConversationHistory();
            
            // Focus input
            document.getElementById('messageInput').focus();
        }

        async function logout() {
            try {
                await puter.auth.logout();
                currentUser = null;
                conversationHistory = [];
                
                // Hide chat, show auth
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('chatMessages').classList.add('hidden');
                document.getElementById('inputArea').classList.add('hidden');
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('chatMessages').innerHTML = '<div class="welcome-message"><h3>Welcome! 👋</h3><p>This is a Puter.js powered chatbot. All your conversations are saved to your Puter cloud storage.</p></div>';
                
                alert('Logged out successfully!');
            } catch (error) {
                console.error('Logout failed:', error);
            }
        }

        async function loadConversationHistory() {
            try {
                const history = await puter.kv.get('chatbot_history');
                if (history) {
                    conversationHistory = JSON.parse(history);
                    // Display loaded messages
                    const chatMessages = document.getElementById('chatMessages');
                    chatMessages.innerHTML = '<div class="welcome-message"><h3>Welcome! 👋</h3><p>This is a Puter.js powered chatbot. All your conversations are saved to your Puter cloud storage.</p></div>';
                    
                    for (const msg of conversationHistory) {
                        addMessageToUI(msg.content, msg.role);
                    }
                    console.log('Loaded previous conversation');
                }
            } catch (e) {
                console.log('No previous conversation found');
            }
        }

        async function saveConversationHistory() {
            try {
                await puter.kv.set('chatbot_history', JSON.stringify(conversationHistory));
                console.log('Conversation saved to Puter cloud');
            } catch (e) {
                console.log('Could not save to Puter cloud:', e);
            }
        }

        // Send message on Enter key
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessages = document.getElementById('chatMessages');

            const message = messageInput.value.trim();

            if (!message) {
                alert('Please enter a message');
                return;
            }

            // Add user message to UI and history
            addMessageToUI(message, 'user');
            conversationHistory.push({
                role: 'user',
                content: message
            });

            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Use Puter's AI (if available) or simple echo response
                let responseText = await getPuterAIResponse(message);

                // Remove typing indicator
                typingDiv.remove();

                // Add bot response to UI and history
                addMessageToUI(responseText, 'bot');
                conversationHistory.push({
                    role: 'assistant',
                    content: responseText
                });

                // Save to Puter cloud storage
                await saveConversationHistory();

            } catch (error) {
                typingDiv.remove();
                const errorMsg = error.message || 'Failed to get response';
                addMessageToUI(`Error: ${errorMsg}`, 'error');
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        async function getPuterAIResponse(message) {
            // Try to use Puter's AI API if available
            try {
                if (puter.ai && puter.ai.chat) {
                    const response = await puter.ai.chat(message, {
                        conversation_id: currentUser.uuid
                    });
                    return response;
                }
            } catch (e) {
                console.log('Puter AI not available, using fallback');
            }

            // Fallback: Echo response with timestamp
            return `I received your message: "${message}". Puter.js chatbot at ${new Date().toLocaleTimeString()}`;
        }

        function addMessageToUI(text, sender) {
            const chatMessages = document.getElementById('chatMessages');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            // Auto scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Clear history with Ctrl+Shift+C
        document.addEventListener('keydown', async (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyC') {
                e.preventDefault();
                conversationHistory = [];
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '<div class="welcome-message"><h3>Welcome! 👋</h3><p>This is a Puter.js powered chatbot. All your conversations are saved to your Puter cloud storage.</p></div>';
                
                // Clear from Puter cloud storage
                try {
                    await puter.kv.set('chatbot_history', JSON.stringify([]));
                } catch (e) {
                    console.log('Could not clear cloud history:', e);
                }
                alert('Conversation history cleared!');
            }
        });
    </script>
</body>
</html>
